# ================================================================
#  FREELANCE PLATFORM — Configuration Spring Boot 4
#  Fichier de base : valeurs communes à tous les profils
# ================================================================

spring:
  application:
    name: freelance-platform

  # Active le profil via -Dspring.profiles.active=dev|prod|docker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Jackson (Jackson 3, défaut Spring Boot 4) ──────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # ── JPA / Hibernate ───────────────────────────────────────────
  jpa:
    open-in-view: false           # Évite les lazy-loading silencieux en vue
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true  # Alerte N+1
    hibernate:
      ddl-auto: validate            # Flyway gère le DDL, Hibernate valide

  # ── Flyway ────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── Cache ─────────────────────────────────────────────────────
  cache:
    type: redis

  # ── WebSocket ─────────────────────────────────────────────────
  websocket:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}

  # ── Mail ──────────────────────────────────────────────────────
  mail:
    default-encoding: UTF-8

  # ── Virtual Threads (Java 21 / Project Loom) ──────────────────
  threads:
    virtual:
      enabled: true

# ── Serveur ───────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  error:
    include-message: never         # Ne pas exposer les messages d'erreur internes
    include-binding-errors: never
    include-stacktrace: never

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: '@project.version@'

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    disable-swagger-default-url: true
  show-actuator: false

# ── Propriétés applicatives custom ───────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_USE_256BIT_KEY_MIN_32_CHARS!!}
    access-token-expiration: ${JWT_ACCESS_EXPIRY:900}        # 15 min en secondes
    refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800}   # 7 jours en secondes
    issuer: freelance-platform

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  pagination:
    default-page-size: 20
    max-page-size: 100

  upload:
    max-file-size: 5MB
    allowed-types: image/jpeg,image/png,application/pdf

  notification:
    sse-timeout: 30000   # ms avant reconnexion SSE